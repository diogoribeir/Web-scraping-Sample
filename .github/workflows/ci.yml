name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-e-validar-conteudo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Portão de conteúdo: sinaliza divergências do conteúdo verificado (camada B).
      - name: Validar conteúdo verificado
        run: npm run verify-content
      - name: Build
        run: npm run build
