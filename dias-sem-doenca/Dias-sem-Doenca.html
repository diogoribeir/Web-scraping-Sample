<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <title>Dias sem Doença</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
:root{
  --teal:#0d9488; --teal-d:#0f766e; --teal-l:#5eead4;
  --red:#dc2626; --red-d:#b91c1c;
  --ink:#0f172a; --muted:#64748b; --bg:#f1f5f9; --card:#ffffff;
  --ok:#16a34a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.topbar{
  background:linear-gradient(135deg,var(--teal),var(--teal-d));
  color:#fff; padding:22px 18px 18px; text-align:center;
  border-radius:0 0 24px 24px;
}
.topbar h1{margin:0;font-size:1.5rem}
.topbar .sub{margin:4px 0 0;opacity:.85;font-size:.9rem}

.cards{display:flex;flex-direction:column;gap:16px;padding:18px;max-width:560px;margin:0 auto}
.card{
  background:var(--card);border-radius:20px;padding:20px;
  box-shadow:0 6px 20px rgba(2,8,23,.08);
  border:2px solid transparent; transition:border-color .2s;
}
.card.sick{border-color:#fecaca;background:#fff5f5}
.card .head{display:flex;align-items:center;justify-content:space-between}
.card .name{font-size:1.25rem;font-weight:700}
.badge{font-size:.78rem;font-weight:700;padding:4px 10px;border-radius:999px}
.badge.ok{background:#dcfce7;color:#166534}
.badge.bad{background:#fee2e2;color:#991b1b}

.counter{text-align:center;margin:14px 0 6px}
.counter .num{font-size:4rem;line-height:1;font-weight:800;color:var(--teal-d)}
.card.sick .counter .num{color:var(--red)}
.counter .label{color:var(--muted);font-size:.95rem;margin-top:4px}

.illness-box{
  background:#fff;border:1px dashed #fca5a5;border-radius:14px;
  padding:10px 12px;margin:10px 0;font-size:.92rem
}
.illness-box b{color:var(--red-d)}

.meta{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0 2px}
.chip{background:#f1f5f9;border-radius:999px;padding:5px 12px;font-size:.8rem;color:var(--muted)}
.chip b{color:var(--ink)}

.actions{margin-top:14px;display:flex;gap:10px}
.btn{
  flex:1;border:0;border-radius:14px;padding:14px;font-size:1rem;font-weight:700;
  cursor:pointer;color:#fff
}
.btn.danger{background:var(--red)} .btn.danger:active{background:var(--red-d)}
.btn.ok{background:var(--ok)} .btn.ok:active{filter:brightness(.92)}
.btn.ghost{background:#e2e8f0;color:var(--ink)}

details.history{margin-top:12px}
details.history summary{cursor:pointer;color:var(--teal-d);font-weight:600;font-size:.9rem}
.log{list-style:none;padding:0;margin:10px 0 0}
.log li{
  border-left:3px solid var(--teal-l);padding:6px 0 6px 12px;margin:8px 0;font-size:.86rem
}
.log .d{color:var(--muted);font-size:.78rem}
.log .empty{color:var(--muted);font-style:italic;border:0;padding-left:0}

.footer{
  max-width:560px;margin:0 auto;padding:8px 18px 28px;
  display:flex;align-items:center;justify-content:space-between
}
.link-btn{background:none;border:0;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:.85rem}
.tag{font-size:.75rem;color:var(--teal-d);background:#ccfbf1;padding:3px 10px;border-radius:999px}

.modal{position:fixed;inset:0;background:rgba(2,8,23,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.modal.hidden{display:none}
.modal-box{background:#fff;width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:up .2s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.modal-box h2{margin:0 0 14px;font-size:1.2rem}
.modal-box label{display:block;font-size:.82rem;color:var(--muted);margin:12px 0 4px;font-weight:600}
.modal-box input{width:100%;padding:13px;border:1.5px solid #cbd5e1;border-radius:12px;font-size:1rem}
.modal-box input:focus{outline:none;border-color:var(--teal)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.muted{color:var(--muted);font-size:.9rem;margin:0}

  </style>
</head>
<body>
  <header class="topbar">
    <h1>🩺 Dias sem Doença</h1>
    <p class="sub">Quantos dias cada um fica saudável</p>
  </header>

  <main id="cards" class="cards"></main>

  <footer class="footer">
    <button id="resetBtn" class="link-btn">Reiniciar tudo</button>
    <span id="offlineTag" class="tag">offline ✓</span>
  </footer>

  <!-- Modal: registrar doença -->
  <div id="sickModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2 id="sickTitle">Registrar doença</h2>
      <label>Qual doença?</label>
      <input id="sickName" type="text" placeholder="Ex.: gripe, virose, dor de garganta" autocomplete="off" />
      <label>Observação (opcional)</label>
      <input id="sickNote" type="text" placeholder="Ex.: febre, foi ao médico..." autocomplete="off" />
      <label>Começou em</label>
      <input id="sickDate" type="date" />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Cancelar</button>
        <button id="sickConfirm" class="btn danger">Marcar como doente</button>
      </div>
    </div>
  </div>

  <!-- Modal: recuperação -->
  <div id="wellModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h2 id="wellTitle">Marcar recuperação</h2>
      <p id="wellInfo" class="muted"></p>
      <label>Recuperou em</label>
      <input id="wellDate" type="date" />
      <div class="modal-actions">
        <button class="btn ghost" data-close>Cancelar</button>
        <button id="wellConfirm" class="btn ok">Recuperado! 🎉</button>
      </div>
    </div>
  </div>
  <script>
/* Dias sem Doença — contador offline para Di e Tati.
   Tudo fica salvo localmente (localStorage), funciona sem internet. */

(function () {
  "use strict";

  var STORAGE_KEY = "ddsd_v1";
  var DAY = 86400000;

  // ---------- estado ----------
  function defaultState() {
    var now = Date.now();
    function person(name) {
      return {
        name: name,
        status: "healthy",     // "healthy" | "sick"
        streakStart: now,      // início da sequência saudável atual
        illness: null,         // { name, note, startedAt }
        records: [],           // histórico de doenças já recuperadas
        best: 0                // melhor sequência em dias
      };
    }
    return { people: { di: person("Di"), tati: person("Tati") } };
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      var s = JSON.parse(raw);
      if (!s || !s.people || !s.people.di || !s.people.tati) return defaultState();
      return s;
    } catch (e) {
      return defaultState();
    }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  var state = load();

  // ---------- datas ----------
  function startOfDay(ts) {
    var d = new Date(ts);
    d.setHours(0, 0, 0, 0);
    return d.getTime();
  }
  // dias completos entre dois instantes, contando por dia de calendário
  function daysBetween(fromTs, toTs) {
    var diff = startOfDay(toTs) - startOfDay(fromTs);
    return Math.max(0, Math.floor(diff / DAY));
  }
  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
  }
  function plural(n, one, many) { return n + " " + (n === 1 ? one : many); }
  // valor de <input type=date> -> timestamp (meio-dia local, evita fuso)
  function dateInputToTs(value) {
    if (!value) return Date.now();
    var p = value.split("-");
    return new Date(+p[0], +p[1] - 1, +p[2], 12, 0, 0).getTime();
  }
  function tsToDateInput(ts) {
    var d = new Date(ts);
    var m = ("0" + (d.getMonth() + 1)).slice(-2);
    var day = ("0" + d.getDate()).slice(-2);
    return d.getFullYear() + "-" + m + "-" + day;
  }

  // ---------- render ----------
  var cardsEl = document.getElementById("cards");

  function render() {
    var now = Date.now();
    var ids = Object.keys(state.people);
    var html = ids.map(function (id) {
      var p = state.people[id];
      if (p.status === "healthy") {
        var d = daysBetween(p.streakStart, now);
        if (d > (p.best || 0)) { p.best = d; }
        return healthyCard(id, p, d);
      }
      return sickCard(id, p, now);
    }).join("");
    cardsEl.innerHTML = html;
    save();
  }

  function historyHtml(p) {
    if (!p.records || !p.records.length) {
      return '<ul class="log"><li class="empty">Nenhuma doença registrada ainda 🙌</li></ul>';
    }
    var items = p.records.slice().reverse().map(function (r) {
      var sick = plural(daysBetween(r.startedAt, r.recoveredAt), "dia doente", "dias doente");
      var note = r.note ? ' — <span class="d">' + escapeHtml(r.note) + "</span>" : "";
      return '<li><b>' + escapeHtml(r.name) + "</b>" + note +
        '<div class="d">' + fmtDate(r.startedAt) + " → " + fmtDate(r.recoveredAt) +
        " · " + sick + "</div></li>";
    }).join("");
    return '<ul class="log">' + items + "</ul>";
  }

  function healthyCard(id, p, d) {
    var last = p.records.length ? p.records[p.records.length - 1] : null;
    var lastChip = last
      ? '<span class="chip">última: <b>' + escapeHtml(last.name) + "</b></span>"
      : "";
    return '' +
      '<section class="card" data-id="' + id + '">' +
        '<div class="head"><span class="name">' + escapeHtml(p.name) + '</span>' +
          '<span class="badge ok">saudável ✓</span></div>' +
        '<div class="counter"><div class="num">' + d + '</div>' +
          '<div class="label">' + (d === 1 ? "dia" : "dias") + ' sem doença</div></div>' +
        '<div class="meta">' +
          '<span class="chip">desde <b>' + fmtDate(p.streakStart) + "</b></span>" +
          '<span class="chip">recorde: <b>' + (p.best || 0) + " dias</b></span>" +
          lastChip +
        "</div>" +
        '<div class="actions"><button class="btn danger" data-act="sick">Registrar doença 🤒</button></div>' +
        '<details class="history"><summary>Histórico (' + p.records.length + ')</summary>' +
          historyHtml(p) + "</details>" +
      "</section>";
  }

  function sickCard(id, p, now) {
    var sickDays = daysBetween(p.illness.startedAt, now);
    var noteHtml = p.illness.note ? "<br><span>" + escapeHtml(p.illness.note) + "</span>" : "";
    return '' +
      '<section class="card sick" data-id="' + id + '">' +
        '<div class="head"><span class="name">' + escapeHtml(p.name) + '</span>' +
          '<span class="badge bad">doente 🤒</span></div>' +
        '<div class="counter"><div class="num">' + sickDays + '</div>' +
          '<div class="label">' + (sickDays === 1 ? "dia" : "dias") + ' doente</div></div>' +
        '<div class="illness-box">Doença: <b>' + escapeHtml(p.illness.name) + "</b>" +
          " <span class=\"d\">(desde " + fmtDate(p.illness.startedAt) + ")</span>" + noteHtml + "</div>" +
        '<div class="actions"><button class="btn ok" data-act="well">Marcar recuperação 🎉</button></div>' +
        '<details class="history"><summary>Histórico (' + p.records.length + ')</summary>' +
          historyHtml(p) + "</details>" +
      "</section>";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- modais ----------
  var sickModal = document.getElementById("sickModal");
  var wellModal = document.getElementById("wellModal");
  var pendingId = null;

  function openSick(id) {
    pendingId = id;
    document.getElementById("sickTitle").textContent = "Registrar doença — " + state.people[id].name;
    document.getElementById("sickName").value = "";
    document.getElementById("sickNote").value = "";
    document.getElementById("sickDate").value = tsToDateInput(Date.now());
    sickModal.classList.remove("hidden");
    setTimeout(function () { document.getElementById("sickName").focus(); }, 50);
  }

  function openWell(id) {
    pendingId = id;
    var p = state.people[id];
    document.getElementById("wellTitle").textContent = "Recuperação — " + p.name;
    document.getElementById("wellInfo").textContent =
      "Doença atual: " + p.illness.name + " (desde " + fmtDate(p.illness.startedAt) + ").";
    document.getElementById("wellDate").value = tsToDateInput(Date.now());
    wellModal.classList.remove("hidden");
  }

  function closeModals() {
    sickModal.classList.add("hidden");
    wellModal.classList.add("hidden");
    pendingId = null;
  }

  // ações
  cardsEl.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-act]");
    if (!btn) return;
    var card = e.target.closest("[data-id]");
    var id = card.getAttribute("data-id");
    if (btn.getAttribute("data-act") === "sick") openSick(id);
    else if (btn.getAttribute("data-act") === "well") openWell(id);
  });

  document.getElementById("sickConfirm").addEventListener("click", function () {
    if (!pendingId) return;
    var name = document.getElementById("sickName").value.trim();
    if (!name) { document.getElementById("sickName").focus(); return; }
    var p = state.people[pendingId];
    var startedAt = dateInputToTs(document.getElementById("sickDate").value);
    // fecha a sequência saudável (já contabilizada no recorde via render)
    var streakDays = daysBetween(p.streakStart, startedAt);
    if (streakDays > (p.best || 0)) p.best = streakDays;
    p.status = "sick";
    p.illness = {
      name: name,
      note: document.getElementById("sickNote").value.trim(),
      startedAt: startedAt
    };
    closeModals();
    render();
  });

  document.getElementById("wellConfirm").addEventListener("click", function () {
    if (!pendingId) return;
    var p = state.people[pendingId];
    if (!p.illness) { closeModals(); return; }
    var recoveredAt = dateInputToTs(document.getElementById("wellDate").value);
    if (recoveredAt < p.illness.startedAt) recoveredAt = p.illness.startedAt;
    p.records.push({
      name: p.illness.name,
      note: p.illness.note,
      startedAt: p.illness.startedAt,
      recoveredAt: recoveredAt
    });
    // recomeça a contagem de dias sem doença a partir da recuperação
    p.status = "healthy";
    p.streakStart = recoveredAt;
    p.illness = null;
    closeModals();
    render();
  });

  // fechar modais
  Array.prototype.forEach.call(document.querySelectorAll("[data-close]"), function (b) {
    b.addEventListener("click", closeModals);
  });
  [sickModal, wellModal].forEach(function (m) {
    m.addEventListener("click", function (e) { if (e.target === m) closeModals(); });
  });

  // reiniciar tudo
  document.getElementById("resetBtn").addEventListener("click", function () {
    if (confirm("Apagar todo o histórico e zerar os contadores de Di e Tati?")) {
      state = defaultState();
      save();
      render();
    }
  });

  // ---------- relógio: atualiza sozinho ----------
  render();
  setInterval(render, 30000);                 // recalcula a cada 30s
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render();           // ao reabrir o app
  });

})();

  </script>
</body>
</html>
